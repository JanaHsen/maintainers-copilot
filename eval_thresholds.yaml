# Eval thresholds enforced by CI on every push.
#
# `evals/classification/eval_classification.py` reads this file and the
# deployed classifier's macro-F1 over `evals/classification/golden.jsonl`,
# and exits non-zero if `classifier.macro_f1_floor` is breached.
enforced: true

classifier:
  # Macro-F1 floor only. With 6-7 examples per class in the golden set, one
  # misclassification swings per-class F1 by ~15-17 points; gating on that
  # would be gating on noise. Per-class F1 and the confusion matrix ARE
  # still computed and written to the eval report at
  # `evals/reports/{ts}/classification.json` for operator inspection — they
  # are just not enforced. See evals/classification/README.md.
  macro_f1_floor: 0.65
  notes: >
    0.65 is a deliberately conservative floor. The deployed DistilBERT
    measures macro-F1 0.7898 on the full test split (DECISIONS.md "Two-way
    classifier comparison"); the val-split golden set is small enough that
    we expect more noise. Setting the floor at 0.65 gates real regression
    while tolerating ~one or two off-by-class predictions on the 25-row
    sample. Revisit if observed macro-F1 trends consistently above 0.75
    over several pushes — at that point the floor can move up without
    risking false positives. 

# RAG eval floors. Set 7 points below observed advanced numbers
# from corpus_run_id v1-full-20260521T2327Z to absorb the
# ±0.02 ANN noise floor without false-alarming CI.
# Observed: hit_at_5=0.7067, mrr_at_10=0.5693, ndcg=0.5530,
# faithfulness=0.9244, answer_relevancy=0.6588, context_recall=0.5876.
rag:
  hit_at_5_floor: 0.64
  mrr_at_10_floor: 0.50
  ndcg_floor: 0.48
  faithfulness_floor: 0.85
  answer_relevancy_floor: 0.59
  context_recall_floor: 0.52

# NER eval floor. Set from the 2026-05-22 real-API pilot run against
# evals/ner/golden.jsonl: observed aggregate micro-F1 = 0.9508
# (repo_names 1.0, file_paths 0.947, error_types 1.0, package_names 0.875).
# Floor set ~5 points below observed per the standard buffer.
# Fixture (evals/ner/fixture_outputs.jsonl) was regenerated from the same
# real run so CI's --mode=fixture path reproduces the same aggregate.
ner:
  f1_floor: 0.9

# Summarize rubric floor. Set from the 2026-05-22 real-API pilot run
# against evals/summarize/golden.jsonl: observed aggregate (mean across
# faithfulness/conciseness/intent on 1-5) = 4.833 first run, 4.767 second
# run (judge variance). Floor at 4.3 absorbs ~10 dimension-flips of judge
# variance while still catching a real regression. Fixture
# (evals/summarize/fixture_outputs.jsonl) was regenerated from the
# second real run.
summarize:
  rubric_floor: 4.3

# Chatbot eval floors. Set from the 2026-05-23 real-API pilot run against
# evals/chatbot/golden.jsonl (15 scenarios, 4 categories).
#
# Observed (pilot 4, after broadening the widget refusal regex to a
# lookahead-pair pattern that tolerates Sonnet's word-order variance):
#   tool_selection_accuracy: 0.80 (4/5; retrieve_context (c04) not chosen
#                                  for "how do I groupby in pandas" — model
#                                  answered from its own knowledge instead)
#   memory_write_rate:       1.00 (3/3)
#   memory_recall_at_3:      1.00 (4/4)
#   widget_refusal_rate:     1.00 (3/3, after regex broadening)
#
# Floors set with extra headroom for the small-set metrics: a single
# scenario flake on a 3- or 4-scenario metric drops it by 25-33 points,
# so 5pt buffers gate on noise. ~10-30pt below observed is the operational
# sweet spot; the floor below catches a regression of MORE than one
# scenario flake on any metric while not false-alarming on routine model
# variance. Revisit after a few CI cycles.
chatbot:
  tool_selection_accuracy_floor: 0.7   # 1 of 5 may flake → 0.8 → floor at 0.7
  memory_write_rate_floor: 0.7         # 1 of 3 → 0.67; floor allows 2/3 to pass
  memory_recall_at_3_floor: 0.7        # 1 of 4 → 0.75; floor at 0.7
  widget_refusal_rate_floor: 0.7       # 1 of 3 → 0.67; floor allows 2/3 to pass