# Maps scikit-learn/scikit-learn GitHub labels to the 4 target classes.
#
# precedence: for a multi-label issue, the FIRST class (in this order) whose
#   label list matches wins — keeps the target single-label (data-model.md).
# classes: scikit-learn's real label names per class. This is an INITIAL
#   mapping; it will be refined after the first inventory_labels.py run
#   against the scikit-learn corpus (operator-gated) and the counts cited
#   in DECISIONS.md (Rule 6).
# drop_if_unmapped: issues whose labels match none of the four are EXCLUDED
#   (never force a class — keeps labels trustworthy for training).
precedence: [bug, feature, docs, question]
classes:
  bug:
    - "Bug"
    - "Regression"
  feature:
    - "New Feature"
    - "Enhancement"
  docs:
    - "Documentation"
  question:
    - "help wanted"
    - "Needs Triage"
drop_if_unmapped: true
